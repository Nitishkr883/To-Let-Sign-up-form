<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tolet Form</title>
    <link rel="stylesheet" href="style.css"></link>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="form">
        <form action="?">
            <h1>Create Account on To-let</h1>
            <div class="inputb"><input type="text" id="name" placeholder="" ><label for="name" >Username</label></div><br>

            <i class="fa-solid fa-user"></i>
            
            <div class="inputb" ><input type="password" id="pass" min="8" placeholder=""> <label for="pass" >Create Passward</label> </div><br>
             
            <i class="fa-solid fa-lock"></i>
            <div class="inputb"><input type="number" id="MobNo." placeholder=""> <label for="MobNo.">Mob. No.</label>  </div><br>     
           
            <div class="inputb"><input type="text" id="state" placeholder=""><label for="state">State</label> </div><br>
                     
            <div class="inputb"><input type="text" id="city" placeholder=""><label for="city">Enter City</label> </div><br> 
            <i class="fa-solid fa-location-dot"></i>     
            <div id="btn" class="inputb"><button type="submit">Register</button></div><br>
            <div id="login">Already have account? <a href="">Login</a></div>    
              
        </form>
    </div>
</body>
</html>
